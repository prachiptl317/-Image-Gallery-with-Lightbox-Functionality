<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Image Gallery with Lightbox</title>
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>
        
        <h1>My Image Gallery</h1>

        <div class="gallery">
            
            <img src="https://picsum.photos/400/300?1" onclick="openLightbox(0)">
            <img src="https://picsum.photos/400/300?2" onclick="openLightbox(1)">
            <img src="https://picsum.photos/400/300?3" onclick="openLightbox(2)">
            <img src="https://picsum.photos/400/300?4" onclick="openLightbox(3)">
            <img src="https://picsum.photos/400/300?5" onclick="openLightbox(4)">
            <img src="https://picsum.photos/400/300?6" onclick="openLightbox(5)">
            <img src="https://picsum.photos/400/300?7" onclick="openLightbox(6)">
            <img src="https://picsum.photos/400/300?8" onclick="openLightbox(7)">
            <img src="https://picsum.photos/400/300?9" onclick="openLightbox(8)">
            <img src="https://picsum.photos/400/300?10" onclick="openLightbox(9)">
            <img src="https://picsum.photos/400/300?11" onclick="openLightbox(10)">
            <img src="https://picsum.photos/400/300?12" onclick="openLightbox(11)">
        </div>
        
        <div id="lightbox" class="lightbox">
            
            <span class="close" onclick="closeLightbox()">×</span>
            
            <span class="nav left" onclick="prevImage()">❮</span>
            
            <img id="lightbox-img" src="" alt="large image">
            
            <span class="nav right" onclick="nextImage()">❯</span>
        
        </div>
        
        <script src="script.js"></script>
    
    </body>
    
</html>
